<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Battle</title>
    <script type="module" crossorigin src="/Typo/assets/index-DiCnqitT.js"></script>
    <link rel="stylesheet" crossorigin href="/Typo/assets/index-Cfm9YL0h.css">
  </head>
  <body>
    <div id="app" class="centered">

      <!-- Start Screen -->
      <section id="start-screen" class="screen">
        <h1 class="title">Tipp-Schlacht</h1>
        <p class="subtitle">Überwinde deine Grenzen — zeige deine Geschwindigkeit und Präzision.</p>
        <div class="controls">
          <input id="player-name" type="text" placeholder="Dein Name..." class="name-input" maxlength="20" />
          <button id="start-btn" class="btn neon">Spiel starten</button>
        </div>
        <small class="hint">Dunkler Modus • Vanilla JS • Bereitgestellt auf Cloudflare Pages</small>
      </section>

      <!-- Game Screen -->
      <section id="game-screen" class="screen hidden">
        <div id="countdown" class="countdown"></div>

        <div class="game-top">
          <div class="sentence-box" id="sentence-box"></div>
          <input id="typing-input" class="typing-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        </div>

        <div class="stats">
          <div>WPM: <span id="wpm">0</span></div>
          <div>Accuracy: <span id="accuracy">100%</span></div>
          <div>Mistakes: <span id="mistakes">0</span></div>
        </div>

        <div id="leaderboard" class="leaderboard"></div>
      </section>

      <!-- End Screen -->
      <section id="end-screen" class="screen hidden">
        <h2 id="end-title"></h2>
        <p id="end-message" style="text-align: center; margin: 20px 0;"></p>
        <button id="play-again" class="btn neon">Nochmal spielen</button>
        <button id="view-leaderboard" class="btn neon" style="margin-top: 8px;">Leaderboard</button>
      </section>

      <!-- Leaderboard Screen -->
      <section id="leaderboard-screen" class="screen hidden">
        <h2>Globales Leaderboard</h2>
        <div id="global-leaderboard" class="leaderboard" style="margin-top: 20px;"></div>
        <button id="back-to-menu" class="btn neon" style="margin-top: 20px;">Zurück zum Menü</button>
      </section>

    </div>

  </body>
</html>
