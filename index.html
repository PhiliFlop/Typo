<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Battle</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app" class="centered">
      <a class="admin-btn" href="https://dash.cloudflare.com/80cb485fdb9fe1040d4ff6dc1bc5adff/workers/d1/databases/53f6561c-ad90-428f-9cf4-4973fba85238/studio" target="_blank" rel="noopener noreferrer">Admin access (Finger weg)</a>

      <!-- Start Screen -->
      <section id="start-screen" class="screen">
        <h1 class="title">Typeshift</h1>
        <p class="subtitle">!!! Folgt uns auf jh6_abi_2028 Tiktok und Instagram !!!</p>
        <div class="controls">
          <input id="player-name" type="text" placeholder="Dein Name + Klasse..." class="name-input" maxlength="20" />
          <button id="start-btn" class="btn neon">Spiel starten</button>
        </div>
        <small class="hint">Tippe so als ginge es um dein Leben</small>
        <div class="start-leaderboard" aria-live="polite">
          <div class="start-leaderboard-title">Top 10</div>
          <div id="start-leaderboard-list" class="leaderboard compact"></div>
        </div>
      </section>

      <!-- Game Screen -->
      <section id="game-screen" class="screen hidden">
        <div id="countdown" class="countdown"></div>

        <div class="game-top">
          <div class="sentence-box" id="sentence-box"></div>
          <input id="typing-input" class="typing-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        </div>

        <div class="stats">
          <div>WPM: <span id="wpm">0</span></div>
          <div>Accuracy: <span id="accuracy">100%</span></div>
          <div>Mistakes: <span id="mistakes">0</span></div>
        </div>

        <div id="leaderboard" class="leaderboard"></div>
      </section>

      <!-- Leaderboard Screen -->
      <section id="leaderboard-screen" class="screen hidden">
        <h2>Globales Leaderboard</h2>
        <div id="your-rank" class="your-rank"></div>
        <div id="global-leaderboard" class="leaderboard" style="margin-top: 20px;"></div>
        <button id="back-to-menu" class="btn neon" style="margin-top: 20px;">Zurück zum Menü</button>
      </section>

    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
